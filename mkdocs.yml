site_name:  Mathias Déhais - Professeur de NSI - Lycée Jean Prévost
docs_dir: docs-public

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: green
      accent: lime
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - toc.integrate  
extra_css:
  - styles/site.css

nav:
  - Accueil: index.md

  - SNT:
      - Accueil: SNT/index.md
      - Thématiques : 
        - Thématique 0 - Python: SNT/python/index.md
        - Thématique 1 - Internet: SNT/internet/index.md
        - Thématique 2 - Web: SNT/web/index.md

  - 1ère NSI:
      - Accueil: 1NSI/index.md
      - Thématiques :
        - Thématique 1 - Langage et Programmation: 1NSI/python/index.md
        - Thématique 2 - Structures de données: 1NSI/donnees/index.md
        - Thématique 3 - Algorithmique: 1NSI/algo/index.md
      - Autres :
        - TP notés: 1NSI/tp/index.md
        - Projets: 1NSI/projet/index.md


  - TNSI:
      - Accueil: TNSI/index.md

  - Club d'Echecs : echecs/index.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences



  